<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="315" r="400">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="315" r="400">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(99,102,241,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo area -->
  <g transform="translate(530, 130)">
    <polygon points="70,20 125,50 125,110 70,140 15,110 15,50" fill="url(#g1)" stroke="#818cf8" stroke-width="2.5"/>
    <polygon points="175,60 175,120 120,150 120,90" fill="url(#g2)" stroke="#a78bfa" stroke-width="2.5" opacity="0.85"/>
    <path d="M80 95 L110 95 M100 85 L110 95 L100 105" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M110 75 L80 75 M90 65 L80 75 L90 85" stroke="#22c55e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <text x="95" y="108" text-anchor="middle" fill="white" font-size="32" font-weight="800" font-family="system-ui" letter-spacing="1">ID</text>
  </g>

  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" fill="white" font-size="56" font-weight="bold" font-family="system-ui">Indiadex</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="#94a3b8" font-size="28" font-family="system-ui">Cross-Chain Swap Platform</text>

  <!-- Tagline -->
  <text x="600" y="465" text-anchor="middle" fill="#6366f1" font-size="20" font-family="system-ui">Swap any token across any chain</text>

  <!-- Features -->
  <g transform="translate(300, 505)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)"/>
    <text x="80" y="24" text-anchor="middle" fill="#818cf8" font-size="15" font-family="system-ui">100+ tokens</text>
    <rect x="180" y="0" width="160" height="36" rx="18" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)"/>
    <text x="260" y="24" text-anchor="middle" fill="#a78bfa" font-size="15" font-family="system-ui">20+ chains</text>
    <rect x="360" y="0" width="200" height="36" rx="18" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)"/>
    <text x="460" y="24" text-anchor="middle" fill="#22c55e" font-size="15" font-family="system-ui">Non-custodial</text>
    <rect x="580" y="0" width="200" height="36" rx="18" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)"/>
    <text x="680" y="24" text-anchor="middle" fill="#fbbf24" font-size="15" font-family="system-ui">0.75% flat fee</text>
  </g>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" fill="#4a4a5a" font-size="16" font-family="system-ui">indiadexswap.xyz</text>
