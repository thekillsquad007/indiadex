<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  
  <!-- Grid background -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(99,102,241,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow -->
  <circle cx="600" cy="315" r="300" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Logo -->
  <g transform="translate(540, 180)">
    <circle cx="60" cy="0" r="28" fill="#6366f1"/>
    <text x="60" y="8" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="Arial">$</text>
    
    <circle cx="120" cy="60" r="28" fill="#6366f1"/>
    <text x="120" y="68" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="Arial">£</text>
    
    <circle cx="60" cy="120" r="28" fill="#6366f1"/>
    <text x="60" y="128" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="Arial">¥</text>
    
    <circle cx="0" cy="60" r="28" fill="#6366f1"/>
    <text x="0" y="68" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="Arial">€</text>
    
    <text x="60" y="70" text-anchor="middle" fill="white" font-size="48" font-weight="bold" font-family="Arial">ID</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" fill="white" font-size="56" font-weight="bold" font-family="Arial">Indiadex</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" fill="#8b8b9a" font-size="28" font-family="Arial">Buy &amp; Sell Crypto with Local Currency</text>
  
  <!-- Stats -->
  <text x="600" y="490" text-anchor="middle" fill="#6366f1" font-size="22" font-family="Arial">40+ Countries · 100+ Cryptocurrencies · Non-Custodial</text>
  
  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" fill="#4a4a5a" font-size="18" font-family="Arial">indiadexswap.xyz</text>
</svg>
